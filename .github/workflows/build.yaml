name:
     DevSecOps CI/CD Pipeline

on:
    push:
        branches: [main]
env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}:latest
 
jobs:

    build_and_test:
      name: Build, Lint, Test, and Scan
      runs-on: ubuntu-latest

      permissions:
        contents: read
        packages: write

      steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set lowercase image name
            run: |
              echo "IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_ENV

          - name: Set up Python
            uses: actions/setup-python@v5
            with:
              python-version: '3.12'
              cache: 'pip'

          - name: Install dependencies
            run: |
                python -m pip install --upgrade pip
                pip install -r app/requirements.txt
                
          - name: Run Linting
            run: |
                flake8 . --count --max-line-length=127 --statistics
              
          - name: Run Bandit Security Analysis 
            run: |
                bandit -r app/ -ll -f txt -o bandit_report.txt || true
            
          - name: Upload Bandit Report
            uses: actions/upload-artifact@v4
            with:
              name: bandit-report
              path: bandit_report.txt

          - name: Run Unit Tests
            env:
                PYTHONPATH: .  
            run: |
                pytest 
                   
          - name: Log in to GitHub Container Registry
            uses: docker/login-action@v2
            with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}    
           
          - name: Build Docker image
            run: |
               docker build -t ${{ env.IMAGE_NAME }} .
                
          - name: Run Trivy vulnerability scan
            uses: aquasecurity/trivy-action@master
            with:
                image-ref: ${{ env.IMAGE_NAME }}
                format: 'table'
                exit-code: '0'
                severity: 'CRITICAL'
          
          - name: Push image
            run: |
              docker push ${{ env.IMAGE_NAME }}
          
    deploy:
        name: Deploy 
        needs: build_and_test 
        runs-on: ubuntu-latest

        steps:

          - name: Set lowercase image name
            run: |
              echo "IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_ENV
         
          - name: Echo deployment info
            run: |
              echo "Image is deployed via GHCR → Azure Container App pulls automatically"